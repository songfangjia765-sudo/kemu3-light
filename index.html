<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>科三灯光模拟</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #ffffff;
      --text: #17211b;
      --muted: #627066;
      --line: #dfe5dd;
      --green: #187a4d;
      --green-dark: #0e5b38;
      --red: #c0392b;
      --shadow: 0 12px 34px rgba(28, 46, 34, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    .app {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 8px 0 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: #1f2a24;
      color: #ffd166;
      font-size: 27px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 5vw, 38px);
      line-height: 1.1;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.4;
    }

    .mode {
      display: flex;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef2ed;
      flex: 0 0 auto;
    }

    .mode button {
      border: 0;
      border-radius: 6px;
      padding: 9px 12px;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      cursor: pointer;
    }

    .mode button.active {
      background: var(--panel);
      color: var(--text);
      box-shadow: 0 2px 10px rgba(28, 46, 34, 0.09);
    }

    .stage {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
      gap: 18px;
      align-items: stretch;
    }

    .practice,
    .side {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .practice {
      padding: 22px;
      min-height: 610px;
      display: flex;
      flex-direction: column;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 15px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #edf5ef;
      color: var(--green-dark);
      font-weight: 800;
    }

    .question-box {
      display: grid;
      place-items: center;
      min-height: 190px;
      margin: 22px 0 16px;
      padding: 22px;
      border: 2px solid #cfd8d0;
      border-radius: 8px;
      background: #fbfcfa;
      text-align: center;
    }

    .question-label {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 800;
    }

    .question {
      margin: 0;
      font-size: clamp(24px, 5vw, 39px);
      line-height: 1.25;
      font-weight: 900;
    }

    .main-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    button {
      font-family: inherit;
      letter-spacing: 0;
    }

    .primary,
    .secondary {
      min-height: 56px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
    }

    .primary {
      border: 0;
      background: var(--green);
      color: white;
    }

    .primary:active {
      background: var(--green-dark);
    }

    .secondary {
      border: 1px solid var(--line);
      background: #f5f7f4;
      color: var(--text);
    }

    .answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .answer {
      min-height: 64px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
    }

    .answer.correct {
      border-color: var(--green);
      background: #e9f8ee;
      color: var(--green-dark);
    }

    .answer.wrong {
      border-color: var(--red);
      background: #fff0ed;
      color: #9d2b21;
    }

    .feedback {
      min-height: 58px;
      margin: 14px 0 0;
      padding: 12px 14px;
      border-radius: 8px;
      background: #f4f6f3;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.45;
    }

    .feedback.good {
      background: #e9f8ee;
      color: var(--green-dark);
    }

    .feedback.bad {
      background: #fff0ed;
      color: #9d2b21;
    }

    .side {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfcfa;
    }

    .stat strong {
      display: block;
      font-size: 30px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat span,
    .tip-list,
    .empty {
      color: var(--muted);
    }

    .panel-title {
      margin: 0;
      font-size: 19px;
      line-height: 1.3;
    }

    .tip-list {
      margin: 0;
      padding-left: 20px;
      font-size: 15px;
      line-height: 1.65;
    }

    .mistakes {
      display: grid;
      gap: 8px;
      max-height: 210px;
      overflow: auto;
      padding-right: 4px;
    }

    .mistake {
      border: 1px solid #efd3cd;
      border-radius: 8px;
      padding: 10px;
      background: #fff8f6;
      font-size: 14px;
      line-height: 1.45;
    }

    .empty {
      margin: 0;
      font-size: 15px;
      line-height: 1.5;
    }

    .small-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: auto;
    }

    .small-actions button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .notice {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 820px) {
      .app {
        padding: 14px;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .mode {
        width: 100%;
      }

      .mode button {
        flex: 1;
      }

      .stage,
      .main-actions,
      .answers {
        grid-template-columns: 1fr;
      }

      .practice {
        min-height: auto;
        padding: 16px;
      }

      .question-box {
        min-height: 170px;
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">灯</div>
        <div>
          <h1>科三灯光模拟</h1>
          <p class="subtitle">按本地题库练习。手机点开始后直接播放考题音频。</p>
        </div>
      </div>
      <div class="mode" aria-label="练习模式">
        <button class="active" type="button" data-mode="random">随机练习</button>
        <button type="button" data-mode="order">顺序练习</button>
      </div>
    </header>

    <section class="stage">
      <div class="practice">
        <div class="status-row">
          <span class="pill" id="modeLabel">随机练习</span>
          <span id="progressText">第 0 / 17 题</span>
        </div>

        <div class="question-box" aria-live="polite">
          <div>
            <p class="question-label">当前语音</p>
            <p class="question" id="questionText">点击“开始模拟”播放考题音频</p>
          </div>
        </div>

        <div class="main-actions">
          <button class="secondary" type="button" id="voiceBtn">试播声音</button>
          <button class="primary" type="button" id="startBtn">开始模拟</button>
          <button class="secondary" type="button" id="repeatBtn">重听语音</button>
        </div>

        <div class="answers" id="answers" aria-label="选择灯光操作"></div>
        <div class="feedback" id="feedback">如果微信里声音异常，请用手机自带浏览器、Chrome 或 Edge 打开。</div>
      </div>

      <aside class="side">
        <h2 class="panel-title">练习成绩</h2>
        <div class="score-grid">
          <div class="stat">
            <strong id="rightCount">0</strong>
            <span>答对</span>
          </div>
          <div class="stat">
            <strong id="wrongCount">0</strong>
            <span>答错</span>
          </div>
        </div>

        <h2 class="panel-title">本地技巧</h2>
        <ul class="tip-list">
          <li>听到“通过、超越”，选择远近光交替。</li>
          <li>听到“跟车、会车、直行通过、照明良好”，选择近光灯。</li>
          <li>听到“照明不良”，选择远光灯。</li>
        </ul>

        <h2 class="panel-title">错题本</h2>
        <div class="mistakes" id="mistakes">
          <p class="empty">还没有错题。</p>
        </div>

        <div class="small-actions">
          <button type="button" id="nextBtn">下一题</button>
          <button type="button" id="resetBtn">重新开始</button>
        </div>
      </aside>
    </section>

    <p class="notice">提示：本页按你提供的本地区题目整理。正式考试前仍要以当地驾校和考场规则为准。</p>
  </main>

  <script>
    const questions = [
      { prompt: "夜间通过急弯、坡路", answer: "远近光交替", note: "听到通过，选择远近光交替。", audio: "audio/q01.wav" },
      { prompt: "夜间通过坡路、拱桥", answer: "远近光交替", note: "听到通过，选择远近光交替。", audio: "audio/q02.wav" },
      { prompt: "夜间通过急弯、拱桥", answer: "远近光交替", note: "听到通过，选择远近光交替。", audio: "audio/q03.wav" },
      { prompt: "夜间通过拱桥、人行横道", answer: "远近光交替", note: "听到通过，选择远近光交替。", audio: "audio/q04.wav" },
      { prompt: "夜间通过没有交通信号灯控制的路口", answer: "远近光交替", note: "听到通过，选择远近光交替。", audio: "audio/q05.wav" },
      { prompt: "夜间超越前方车辆", answer: "远近光交替", note: "听到超越，选择远近光交替。", audio: "audio/q06.wav" },
      { prompt: "夜间同方向近距离跟车行驶", answer: "近光灯", note: "听到跟车，选择近光灯。", audio: "audio/q07.wav" },
      { prompt: "夜间与机动车会车", answer: "近光灯", note: "听到会车，选择近光灯。", audio: "audio/q08.wav" },
      { prompt: "夜间在窄路与非机动车会车", answer: "近光灯", note: "听到会车，选择近光灯。", audio: "audio/q09.wav" },
      { prompt: "夜间在窄桥与非机动车会车", answer: "近光灯", note: "听到会车，选择近光灯。", audio: "audio/q10.wav" },
      { prompt: "夜间直行通过路口", answer: "近光灯", note: "听到直行通过，选择近光灯。", audio: "audio/q11.wav" },
      { prompt: "夜间在照明良好的道路上行驶", answer: "近光灯", note: "听到照明良好，选择近光灯。", audio: "audio/q12.wav" },
      { prompt: "打开近光灯", answer: "近光灯", note: "按指令打开近光灯。", audio: "audio/q13.wav" },
      { prompt: "打开远光灯", answer: "远光灯", note: "按指令打开远光灯。", audio: "audio/q14.wav" },
      { prompt: "夜间在没有路灯，照明不良条件下行驶", answer: "远光灯", note: "听到照明不良，选择远光灯。", audio: "audio/q15.wav" },
      { prompt: "路边临时停车", answer: "示廓灯和危险报警闪光灯", note: "临时停车通常选择示廓灯和危险报警闪光灯。", audio: "audio/q16.wav" },
      { prompt: "夜间发生交通事故又难以移动", answer: "示廓灯和危险报警闪光灯", note: "事故难以移动，选择示廓灯和危险报警闪光灯。", audio: "audio/q17.wav" }
    ];

    const options = ["近光灯", "远光灯", "远近光交替", "示廓灯和危险报警闪光灯"];
    const player = new Audio();
    player.preload = "auto";

    const state = {
      mode: "random",
      currentIndex: -1,
      answered: false,
      right: 0,
      wrong: 0,
      seen: 0,
      mistakes: []
    };

    const els = {
      modeButtons: document.querySelectorAll("[data-mode]"),
      modeLabel: document.getElementById("modeLabel"),
      progressText: document.getElementById("progressText"),
      questionText: document.getElementById("questionText"),
      answers: document.getElementById("answers"),
      feedback: document.getElementById("feedback"),
      voiceBtn: document.getElementById("voiceBtn"),
      startBtn: document.getElementById("startBtn"),
      repeatBtn: document.getElementById("repeatBtn"),
      nextBtn: document.getElementById("nextBtn"),
      resetBtn: document.getElementById("resetBtn"),
      rightCount: document.getElementById("rightCount"),
      wrongCount: document.getElementById("wrongCount"),
      mistakes: document.getElementById("mistakes")
    };

    function playAudio(src) {
      player.pause();
      player.currentTime = 0;
      player.src = src;
      const playTask = player.play();
      if (playTask && typeof playTask.catch === "function") {
        playTask.catch(() => {
          els.feedback.className = "feedback bad";
          els.feedback.textContent = "声音被浏览器拦截了。请再点一次“重听语音”，或用手机自带浏览器打开。";
        });
      }
    }

    function pickNextIndex() {
      if (state.mode === "order") {
        return (state.currentIndex + 1) % questions.length;
      }

      let next = Math.floor(Math.random() * questions.length);
      while (questions.length > 1 && next === state.currentIndex) {
        next = Math.floor(Math.random() * questions.length);
      }
      return next;
    }

    function renderAnswers() {
      els.answers.innerHTML = "";
      options.forEach((option) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "answer";
        button.textContent = option;
        button.addEventListener("click", () => checkAnswer(option, button));
        els.answers.appendChild(button);
      });
    }

    function showQuestion() {
      state.currentIndex = pickNextIndex();
      state.answered = false;
      state.seen += 1;

      const item = questions[state.currentIndex];
      els.questionText.textContent = item.prompt;
      els.feedback.className = "feedback";
      els.feedback.textContent = "请选择正确的灯光操作。";
      els.startBtn.textContent = "下一题";
      updateStats();
      renderAnswers();
      playAudio(item.audio);
    }

    function checkAnswer(option, clickedButton) {
      if (state.currentIndex < 0 || state.answered) {
        return;
      }

      state.answered = true;
      const item = questions[state.currentIndex];
      const isRight = option === item.answer;
      const buttons = els.answers.querySelectorAll(".answer");

      buttons.forEach((button) => {
        if (button.textContent === item.answer) {
          button.classList.add("correct");
        }
      });

      if (isRight) {
        state.right += 1;
        els.feedback.className = "feedback good";
        els.feedback.textContent = "答对了。" + item.note;
      } else {
        state.wrong += 1;
        clickedButton.classList.add("wrong");
        els.feedback.className = "feedback bad";
        els.feedback.textContent = "答错了。正确答案：" + item.answer + "。" + item.note;
        state.mistakes.unshift({ prompt: item.prompt, selected: option, answer: item.answer });
      }

      updateStats();
      renderMistakes();
    }

    function updateStats() {
      els.rightCount.textContent = state.right;
      els.wrongCount.textContent = state.wrong;
      els.progressText.textContent = "第 " + state.seen + " / " + questions.length + " 题";
      els.modeLabel.textContent = state.mode === "random" ? "随机练习" : "顺序练习";
    }

    function renderMistakes() {
      if (state.mistakes.length === 0) {
        els.mistakes.innerHTML = '<p class="empty">还没有错题。</p>';
        return;
      }

      els.mistakes.innerHTML = state.mistakes.map((item) => (
        '<div class="mistake"><strong>' + item.prompt + '</strong><br>你选：' +
        item.selected + '<br>正确：' + item.answer + '</div>'
      )).join("");
    }

    function resetPractice() {
      player.pause();
      player.currentTime = 0;
      state.currentIndex = -1;
      state.answered = false;
      state.right = 0;
      state.wrong = 0;
      state.seen = 0;
      state.mistakes = [];
      els.questionText.textContent = "点击“开始模拟”播放考题音频";
      els.feedback.className = "feedback";
      els.feedback.textContent = "如果微信里声音异常，请用手机自带浏览器、Chrome 或 Edge 打开。";
      els.startBtn.textContent = "开始模拟";
      updateStats();
      renderAnswers();
      renderMistakes();
    }

    els.modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        state.mode = button.dataset.mode;
        els.modeButtons.forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        resetPractice();
      });
    });

    els.voiceBtn.addEventListener("click", () => {
      els.feedback.className = "feedback";
      els.feedback.textContent = "正在试播第一题声音。";
      playAudio(questions[0].audio);
    });
    els.startBtn.addEventListener("click", showQuestion);
    els.nextBtn.addEventListener("click", showQuestion);
    els.repeatBtn.addEventListener("click", () => {
      if (state.currentIndex < 0) {
        els.feedback.className = "feedback";
        els.feedback.textContent = "请先点击开始模拟。";
        return;
      }
      playAudio(questions[state.currentIndex].audio);
    });
    els.resetBtn.addEventListener("click", resetPractice);

    resetPractice();
  </script>
</body>
</html>
